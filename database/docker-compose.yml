services:
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: myrootpassword
      MYSQL_DATABASE: appointment_db
      MYSQL_USER: myuser
      MYSQL_PASSWORD: mypassword
    ports:
      - "3306:3306"
    volumes:
      - appointment_mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: ./database
    container_name: node_api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    env_file:
      - ./database/.env
    command: npm start

volumes:
  appointment_mysql_data: